<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Reservea — Panel de Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800&display=swap" rel="stylesheet">
<style>
/* ── RESET & ROOT ────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--green:#31EDAE;
--green-dim:rgba(49,237,174,.12);
--green-border:rgba(49,237,174,.25);
--bg:#0c0e13;
--surface:#12151c;
--card:#191c25;
--card2:#1e2130;
--border:#232638;
--border2:#2c3045;
--text:#eef0f8;
--text2:#9aa0b8;
--text3:#5a6070;
--font:'Plus Jakarta Sans',system-ui,sans-serif;
--r:13px;
--r2:10px;
--sidebar:230px;
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;overflow:hidden}
.shell{visibility:visible!important;opacity:1!important}

/* ── LAYOUT ─────────────────────────────────────────────── */
.shell{display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR ─────────────────────────────────────────────── */
.sidebar{
width:var(–sidebar);flex-shrink:0;
background:var(–surface);
border-right:1px solid var(–border);
display:flex;flex-direction:column;
height:100vh;overflow:hidden;
}
.sb-logo{
padding:24px 0 22px;
}
.logo-img{
height:22px;width:auto;display:block;
filter:brightness(0) invert(1);
object-fit:contain;
}
.sb-nav{
flex:1;overflow-y:auto;
padding:18px 10px;
display:flex;flex-direction:column;gap:2px;
}
.sb-section{
font-size:10px;letter-spacing:1.8px;text-transform:uppercase;
color:var(–text3);font-weight:600;
padding:18px 12px 7px;
}
.nav-btn{
display:flex;align-items:center;gap:11px;
padding:10px 13px;border-radius:var(–r2);
cursor:pointer;font-size:13.5px;font-weight:500;
color:var(–text2);
transition:all .15s;border:none;background:none;
text-align:left;width:100%;font-family:var(–font);
}
.nav-btn:hover{background:var(–card);color:var(–text)}
.nav-btn.active{background:var(–green-dim);color:var(–green)}
.nav-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.sb-footer{
padding:16px 18px;border-top:1px solid var(–border);
}
.user-row{display:flex;align-items:center;gap:11px}
.user-ava{
width:34px;height:34px;border-radius:50%;
background:var(–green);display:flex;align-items:center;justify-content:center;
font-size:13px;font-weight:700;color:#0c0e13;flex-shrink:0;
}
.user-name{font-size:13px;font-weight:600;color:var(–text)}
.user-role{font-size:11px;color:var(–text3)}

/* ── MAIN ────────────────────────────────────────────────── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ── TOPBAR ──────────────────────────────────────────────── */
.topbar{
height:60px;flex-shrink:0;
background:var(–surface);border-bottom:1px solid var(–border);
display:flex;align-items:center;
padding:0 28px;gap:14px;
}
.topbar-title{font-size:16px;font-weight:700;color:var(–text)}
#mobileBack{display:none}
#mobileTopLogo{display:none}
#mobileMenu{display:none}
.topbar-right{display:flex;align-items:center;gap:12px}
.live-badge{
display:flex;align-items:center;gap:7px;
font-size:11.5px;font-weight:500;color:var(–green);
background:var(–green-dim);border:1px solid var(–green-border);
border-radius:20px;padding:5px 13px;
}
.live-dot{
width:6px;height:6px;border-radius:50%;
background:var(–green);
animation:pulse 1.5s ease infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.date-pick{
background:var(–card);border:1px solid var(–border);
border-radius:var(–r2);padding:7px 13px;
font-size:12.5px;color:var(–text);
font-family:var(–font);cursor:pointer;outline:none;
transition:border-color .15s;
}
.date-pick:focus{border-color:var(–green)}

/* ── BUTTONS ─────────────────────────────────────────────── */
.btn{
display:inline-flex;align-items:center;gap:7px;
padding:8px 18px;border-radius:var(–r2);
font-size:13px;font-weight:600;cursor:pointer;
border:none;font-family:var(–font);transition:all .15s;
}
.btn-primary{background:var(–green);color:#0c0e13}
.btn-primary:hover{background:#28d9a2;transform:translateY(-1px)}
.btn-primary:active{transform:translateY(0)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-ghost{
background:transparent;color:var(–text2);
border:1px solid var(–border);
}
.btn-ghost:hover{border-color:var(–green);color:var(–green)}
.btn-danger{background:rgba(255,75,75,.1);color:#ff4b4b;border:1px solid rgba(255,75,75,.25)}
.btn-danger:hover{background:rgba(255,75,75,.2)}

/* ── PAGES ───────────────────────────────────────────────── */
.page{display:none;flex:1;overflow-y:auto;padding:28px}
.page.active{display:block;min-height:0}

/* ── STAT CARDS ──────────────────────────────────────────── */
.stats-grid{
display:grid;grid-template-columns:repeat(6,1fr);
gap:14px;margin-bottom:26px;
}
.stat-card{
background:var(–card);border:1px solid var(–border);
border-radius:var(–r);padding:20px 22px;
position:relative;overflow:hidden;
transition:border-color .2s,transform .2s;
}
.stat-card:hover{border-color:var(–green);transform:translateY(-2px)}
.stat-icon{
position:absolute;top:18px;right:18px;
font-size:20px;opacity:.4;
}
.stat-label{
font-size:11px;font-weight:600;letter-spacing:.8px;
text-transform:uppercase;color:var(–text2);
margin-bottom:12px;
}
.stat-value{
font-size:30px;font-weight:800;
color:var(–text);line-height:1;margin-bottom:8px;
}
.stat-value.green{color:var(–green)}
.stat-trend{
font-size:12px;font-weight:500;
display:flex;align-items:center;gap:5px;
}
.trend-up{color:#31EDAE}.trend-dn{color:#ff5a5a}.trend-eq{color:var(–text3)}

/* ── CHART ROW ───────────────────────────────────────────── */
.chart-row{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:26px}
.chart-card{
background:var(–card);border:1px solid var(–border);
border-radius:var(–r);padding:22px;
}
.chart-title{font-size:13px;font-weight:600;color:var(–text);margin-bottom:18px}
.chart-sub{font-size:11.5px;color:var(–text3);margin-top:3px}
.bars-wrap{display:flex;align-items:flex-end;gap:7px;height:90px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end}
.bar-item{width:100%;border-radius:4px 4px 0 0;min-height:3px;transition:height .4s ease}
.bar-this{background:var(–green)}
.bar-prev{background:var(–border2)}
.bar-lbl{font-size:9px;color:var(–text3);font-weight:500;white-space:nowrap}
.legend-row{display:flex;gap:14px;margin-bottom:14px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(–text3)}
.legend-dot{width:8px;height:8px;border-radius:2px}

.ocup-list{display:flex;flex-direction:column;gap:10px}
.ocup-row{display:flex;align-items:center;gap:10px}
.ocup-time{font-size:12px;font-weight:600;color:var(–text2);width:44px;flex-shrink:0}
.ocup-bar-wrap{flex:1;height:5px;background:var(–border);border-radius:3px;overflow:hidden}
.ocup-bar{height:100%;border-radius:3px;transition:width .5s ease}
.ocup-val{font-size:11px;color:var(–text3);width:52px;text-align:right;flex-shrink:0;font-weight:500}

/* ── SLOTS ROW ───────────────────────────────────────────── */
.slots-chips{
display:flex;gap:8px;flex-wrap:wrap;
margin-bottom:22px;
}
.slot-chip{
background:var(–card);border:1px solid var(–border);
border-radius:var(–r2);padding:10px 14px;
min-width:90px;text-align:center;
transition:all .15s;cursor:default;
}
.slot-chip:hover{border-color:var(–green);transform:translateY(-2px)}
.slot-chip-time{font-size:15px;font-weight:700;color:var(–text);margin-bottom:5px}
.slot-chip-bar{height:4px;background:var(–border);border-radius:2px;overflow:hidden;margin-bottom:4px}
.slot-chip-fill{height:100%;border-radius:2px;transition:width .5s}
.slot-chip-free{font-size:11px;color:var(–text3);font-weight:500}

/* ── TABLE WRAPPER ───────────────────────────────────────── */
.table-wrap{
background:var(–card);border:1px solid var(–border);
border-radius:var(–r);overflow:hidden;
}
.toolbar{
display:flex;align-items:center;gap:10px;
padding:14px 18px;border-bottom:1px solid var(–border);
flex-wrap:wrap;
}
.search{
flex:1;min-width:200px;
background:var(–surface);border:1px solid var(–border);
border-radius:var(–r2);padding:8px 14px;
font-size:13px;color:var(–text);font-family:var(–font);
outline:none;transition:border-color .15s;
}
.search::placeholder{color:var(–text3)}
.search:focus{border-color:var(–green)}
.filt{
background:var(–surface);border:1px solid var(–border);
border-radius:var(–r2);padding:8px 12px;
font-size:13px;color:var(–text);font-family:var(–font);
outline:none;cursor:pointer;
}
.filt:focus{border-color:var(–green)}
table{width:100%;border-collapse:collapse}
thead tr{border-bottom:1px solid var(–border)}
th{
padding:12px 16px;text-align:left;
font-size:10.5px;font-weight:600;letter-spacing:1.2px;
text-transform:uppercase;color:var(–text3);
white-space:nowrap;cursor:pointer;
transition:color .15s;
}
th:hover{color:var(–text2)}
td{
padding:14px 16px;vertical-align:middle;
border-bottom:1px solid rgba(35,38,56,.7);
}
tbody tr:last-child td{border-bottom:none}
tbody tr{transition:background .1s}
tbody tr:hover td{background:rgba(45,232,155,.025)}
.td-time{font-size:15px;font-weight:800;color:var(–green);letter-spacing:-.3px}
.td-name{font-size:13.5px;font-weight:600;color:var(–text)}
.td-sub{font-size:11.5px;color:var(–text3);margin-top:2px}
.td-phone{font-size:12px;color:var(–text3);font-family:monospace;letter-spacing:.3px}
.karts-wrap{display:flex;gap:4px;flex-wrap:wrap}
.kpill{
font-size:10.5px;font-weight:700;
padding:2px 8px;border-radius:6px;
}
.kp390{background:rgba(49,237,174,.1);color:var(–green);border:1px solid rgba(49,237,174,.2)}
.kp270{background:rgba(100,144,255,.1);color:#6490ff;border:1px solid rgba(100,144,255,.2)}
.kpinf{background:rgba(255,180,50,.1);color:#ffb432;border:1px solid rgba(255,180,50,.2)}
.kpbip{background:rgba(220,100,255,.1);color:#dc64ff;border:1px solid rgba(220,100,255,.2)}
.badge{
display:inline-flex;align-items:center;
font-size:11px;font-weight:600;
padding:3px 10px;border-radius:20px;
}
.bconf{background:rgba(49,237,174,.1);color:var(–green)}
.bpend{background:rgba(255,180,50,.1);color:#ffb432}
.bcanc{background:rgba(255,75,75,.1);color:#ff4b4b}
.td-price{font-size:14px;font-weight:700;color:var(–text)}
.row-actions{display:flex;gap:6px;opacity:0;transition:opacity .15s}
tbody tr:hover .row-actions{opacity:1}
.act-btn{
width:29px;height:29px;border-radius:7px;
background:var(–surface);border:1px solid var(–border);
color:var(–text3);cursor:pointer;
display:flex;align-items:center;justify-content:center;
font-size:13px;transition:all .15s;
}
.act-btn:hover{border-color:var(–green);color:var(–green)}
.act-btn.danger:hover{border-color:#ff4b4b;color:#ff4b4b}
.tfoot{
padding:12px 18px;font-size:12px;color:var(–text3);
border-top:1px solid var(–border);
}
.empty{text-align:center;padding:60px 20px;color:var(–text3)}

/* ── SLOTS EDIT PAGE ─────────────────────────────────────── */
.slots-edit-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.slot-edit-card{
background:var(–card);border:1px solid var(–border);
border-radius:var(–r);padding:22px;
transition:border-color .2s;
}
.slot-edit-card:hover{border-color:var(–green)}
.se-time{font-size:24px;font-weight:800;color:var(–green);letter-spacing:-.5px;margin-bottom:4px}
.se-date{font-size:11.5px;color:var(–text3);margin-bottom:18px}
.se-prog-labels{display:flex;justify-content:space-between;font-size:11px;color:var(–text3);margin-bottom:6px}
.se-prog-bar{height:6px;background:var(–border);border-radius:3px;overflow:hidden}
.se-prog-fill{height:100%;border-radius:3px;transition:width .4s}
.se-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:16px 0 18px}
.se-stat{text-align:center}
.se-stat-val{font-size:18px;font-weight:700;color:var(–text)}
.se-stat-lbl{font-size:10px;color:var(–text3);text-transform:uppercase;letter-spacing:.8px}
.se-inputs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.se-input-wrap{display:flex;flex-direction:column;gap:5px}
.se-input-lbl{font-size:10px;color:var(–text3);font-weight:600;text-transform:uppercase;letter-spacing:.8px}
.se-input{
background:var(–surface);border:1px solid var(–border);
border-radius:8px;padding:7px 10px;
font-size:14px;color:var(–text);font-family:var(–font);
outline:none;text-align:center;width:100%;
}
.se-input:focus{border-color:var(–green)}

/* ── ANALYTICS ───────────────────────────────────────────── */
.analytics-hero{
display:grid;grid-template-columns:repeat(4,1fr);
gap:14px;margin-bottom:26px;
}
.comp-card{
background:var(–card);border:1px solid var(–border);
border-radius:var(–r);padding:20px 22px;
}
.comp-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.comp-label{font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(–text3)}
.comp-badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px}
.comp-value{font-size:26px;font-weight:800;color:var(–text);margin-bottom:6px}
.comp-prev{font-size:12px;color:var(–text3)}

.week-karts{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:26px}
.kart-stat-card{
background:var(–card);border:1px solid var(–border);
border-radius:var(–r);padding:22px;
}
.kart-stat-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.kart-stat-bar-wrap{flex:1;height:5px;background:var(–border);border-radius:3px;overflow:hidden}
.kart-stat-bar{height:100%;border-radius:3px}
.kart-stat-name{font-size:13px;font-weight:600;color:var(–text);width:90px;flex-shrink:0}
.kart-stat-pct{font-size:12px;color:var(–text3);width:36px;text-align:right;flex-shrink:0}

/* ── NEW BOOKING FORM ────────────────────────────────────── */
.form-shell{max-width:780px;margin:0 auto}
.step-bar{display:flex;align-items:center;margin-bottom:32px}
.step-item{display:flex;align-items:center;gap:8px}
.step-num{
width:30px;height:30px;border-radius:50%;
display:flex;align-items:center;justify-content:center;
font-size:12px;font-weight:700;flex-shrink:0;transition:all .25s;
}
.sn-done{background:var(–green);color:#0c0e13}
.sn-active{background:var(–card);border:2px solid var(–green);color:var(–green)}
.sn-idle{background:var(–card);border:2px solid var(–border);color:var(–text3)}
.step-lbl{font-size:12.5px;font-weight:600;transition:color .25s}
.step-line{height:1px;flex:1;margin:0 10px;transition:background .25s}
.sl-done{background:var(–green)}.sl-idle{background:var(–border)}

.form-section{
background:var(–card);border:1px solid var(–border);
border-radius:var(–r);padding:28px;margin-bottom:16px;
}
.form-section-title{
font-size:14px;font-weight:700;color:var(–text);
margin-bottom:22px;
display:flex;align-items:center;gap:10px;
padding-bottom:16px;
border-bottom:1px solid var(–border);
}
.fg{display:flex;flex-direction:column;gap:7px}
.flbl{
font-size:11px;font-weight:600;letter-spacing:.7px;
text-transform:uppercase;color:var(–text3);
}
.finp,.fsel{
background:var(–surface);border:1px solid var(–border);
border-radius:var(–r2);padding:11px 15px;
font-size:14px;color:var(–text);font-family:var(–font);
outline:none;transition:border-color .15s;width:100%;
}
.finp:focus,.fsel:focus{border-color:var(–green)}
.finp::placeholder{color:var(–text3)}
.finp.err{border-color:#ff4b4b}
.ferr{font-size:11.5px;color:#ff4b4b;margin-top:3px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.full{grid-column:1/-1}

.tipo-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:4px}
.tipo-card{
background:var(–surface);border:2px solid var(–border);
border-radius:var(–r);padding:18px 20px;cursor:pointer;transition:all .2s;
}
.tipo-card:hover{border-color:var(–text3)}
.tipo-card.selected{border-color:var(–green);background:var(–green-dim)}
.tipo-title{font-size:14px;font-weight:700;color:var(–text);margin-bottom:5px}
.tipo-desc{font-size:12px;color:var(–text3);line-height:1.5}

.kart-card{
background:var(–surface);border:1px solid var(–border);
border-radius:var(–r2);padding:16px 18px;
display:flex;align-items:center;gap:14px;
margin-bottom:10px;transition:border-color .15s;
}
.kart-card:hover{border-color:var(–border2)}
.kart-info{flex:1}
.kart-name{font-size:14px;font-weight:700;color:var(–text);margin-bottom:4px;display:flex;align-items:center;gap:8px}
.kart-desc{font-size:12px;color:var(–text3)}
.qty-ctrl{display:flex;align-items:center;gap:12px}
.qty-btn{
width:32px;height:32px;border-radius:8px;
background:var(–card);border:1px solid var(–border);
color:var(–text);font-size:18px;font-weight:600;
cursor:pointer;display:flex;align-items:center;justify-content:center;
transition:all .15s;
}
.qty-btn:hover{border-color:var(–green);color:var(–green)}
.qty-val{font-size:18px;font-weight:700;min-width:24px;text-align:center;color:var(–text)}
.aviso-box{
background:rgba(255,180,50,.07);border:1px solid rgba(255,180,50,.2);
border-radius:var(–r2);padding:14px 16px;
font-size:12.5px;color:#ffb432;margin-top:14px;line-height:1.6;
}
.price-summary{
background:var(–green-dim);border:1px solid var(–green-border);
border-radius:var(–r);padding:20px 22px;margin-top:18px;
}
.price-rows{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.price-row{display:flex;justify-content:space-between;font-size:13px;color:var(–text3)}
.price-divider{height:1px;background:var(–green-border);margin:4px 0}
.price-total-row{display:flex;justify-content:space-between;align-items:center}
.price-total-lbl{font-size:15px;font-weight:700;color:var(–text)}
.price-total-val{font-size:26px;font-weight:800;color:var(–green)}

.resumen-card{
background:var(–surface);border:1px solid var(–border);
border-radius:var(–r);padding:22px;
}
.res-row{
display:flex;justify-content:space-between;align-items:center;
padding:11px 0;border-bottom:1px solid var(–border);
}
.res-row:last-child{border-bottom:none}
.res-lbl{font-size:13px;color:var(–text3)}
.res-val{font-size:13.5px;font-weight:600;color:var(–text);text-align:right}

.success-wrap{
background:var(–card);border:2px solid var(–green);
border-radius:var(–r);padding:48px 36px;text-align:center;
max-width:560px;margin:0 auto;
}
.success-ico{font-size:52px;margin-bottom:16px}
.success-title{font-size:24px;font-weight:800;color:var(–green);margin-bottom:8px}
.success-sub{font-size:14px;color:var(–text3);margin-bottom:28px}
.ticket{
background:var(–surface);border:1px solid var(–border);
border-radius:var(–r);padding:20px;margin-bottom:24px;text-align:left;
}

/* ── LOGIN ───────────────────────────────────────────────── */
.login-page{
position:fixed;inset:0;z-index:9999;
background:var(–bg);
display:flex;align-items:center;justify-content:center;
flex-direction:column;
padding:32px 16px;overflow-y:auto;
}
.login-logo{margin-bottom:28px;text-align:center}
.login-logo img{height:44px;width:auto}
.login-brand{font-size:22px;font-weight:700;color:var(–text);margin-top:14px;letter-spacing:-.3px}
.login-brand span{color:var(–green)}
.login-card{
background:var(–card);border:1px solid var(–border);
border-radius:16px;padding:36px;width:420px;max-width:95vw;
}
.login-title{font-size:20px;font-weight:700;color:var(–text);margin-bottom:6px}
.login-sub{font-size:13px;color:var(–text3);margin-bottom:28px;line-height:1.6}
.login-field{display:flex;flex-direction:column;gap:7px;margin-bottom:16px}
.login-lbl{font-size:11px;font-weight:600;letter-spacing:.7px;text-transform:uppercase;color:var(–text3)}
.login-inp{
background:var(–surface);border:1px solid var(–border);
border-radius:var(–r2);padding:12px 15px;
font-size:14px;color:var(–text);font-family:var(–font);
outline:none;transition:border-color .15s;width:100%;
}
.login-inp:focus{border-color:var(–green)}
.login-inp::placeholder{color:var(–text3)}
.login-note{font-size:11.5px;color:var(–text3);text-align:center;margin-top:14px;line-height:1.6}

/* ── MODAL ───────────────────────────────────────────────── */
.modal-overlay{
display:none;position:fixed;inset:0;
background:rgba(0,0,0,.75);z-index:1000;
align-items:center;justify-content:center;
backdrop-filter:blur(4px);
}
.modal-overlay.open{display:flex}
.modal-box{
background:var(–card);border:1px solid var(–border);
border-radius:16px;padding:30px;
width:560px;max-width:95vw;max-height:90vh;overflow-y:auto;
}
.modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.modal-title{font-size:17px;font-weight:700;color:var(–text)}
.modal-x{
width:30px;height:30px;border-radius:7px;
background:var(–surface);border:1px solid var(–border);
color:var(–text3);cursor:pointer;
display:flex;align-items:center;justify-content:center;font-size:15px;
transition:all .15s;
}
.modal-x:hover{border-color:#ff4b4b;color:#ff4b4b}
.modal-foot{display:flex;justify-content:flex-end;gap:10px;margin-top:22px;padding-top:18px;border-top:1px solid var(–border)}

/* ── TOAST ───────────────────────────────────────────────── */
.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:9998;display:flex;flex-direction:column;gap:8px}
.toast{
background:var(–card);border:1px solid var(–border);
border-radius:11px;padding:13px 18px;
font-size:13px;font-weight:500;
display:flex;align-items:center;gap:10px;
animation:tIn .25s ease;min-width:260px;
}
.toast.ok{border-color:rgba(49,237,174,.4);color:var(–green)}
.toast.err{border-color:rgba(255,75,75,.4);color:#ff5a5a}
@keyframes tIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:none}}

/* ── SPINNER ─────────────────────────────────────────────── */
.spin{
width:17px;height:17px;border:2px solid var(–border);
border-top-color:var(–green);border-radius:50%;
animation:spinA .7s linear infinite;display:inline-block;
}
@keyframes spinA{to{transform:rotate(360deg)}}

/* ── SECTION HEADER ──────────────────────────────────────── */
.sec-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;gap:12px}
.sec-title{font-size:15px;font-weight:700;color:var(–text)}
.sec-sub{font-size:12.5px;color:var(–text3);margin-top:3px}

/* ── SCROLLBAR ───────────────────────────────────────────── */
.user-ava-img{width:34px;height:34px;border-radius:50%;object-fit:cover;border:2px solid var(–green)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(–border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(–border2)}

/* ══════════════════════════════════════════════════════════
RESPONSIVE MÓVIL — max-width: 768px
Estrategia: sidebar oculto → bottom nav táctil
══════════════════════════════════════════════════════════ */
@media(max-width:768px){

/* ── Root adjustments ── */
:root{ –sidebar:0px; }

html,body{ overflow:hidden; }

/* Login page necesita scroll en móvil */
#loginPage{ overflow-y:auto !important; align-items:flex-start !important; padding-top:40px !important; padding-bottom:40px !important; }
#loginPage > div { width:100%; }

/* ── Shell: columna única ── */
.shell{
flex-direction:column;
height:100dvh;
overflow:hidden;
}

/* ── Sidebar → hidden on mobile ── */
.sidebar{
display:none;
}

/* ── Main area fills screen ── */
.main{
flex:1;
display:flex;
flex-direction:column;
overflow:hidden;
width:100%;
height:100%;
}

/* ── Topbar mobile ── */
.topbar{
height:58px;
padding:0 14px;
gap:0;
flex-shrink:0;
justify-content:space-between;
position:relative;
}
/* Ocultar reloj, separadores y flex spacers */
.topbar > div[style*=“width:1px”],
.topbar > div[style*=“flex:1”],
.topbar > div[style*=“flex-direction:column”] { display:none!important; }
/* Hamburger */
#mobileMenu{
display:flex!important;
align-items:center;justify-content:center;
width:38px;height:38px;
border-radius:10px;
background:var(–card);border:1px solid var(–border);
color:var(–text2);font-size:20px;
cursor:pointer;flex-shrink:0;transition:all .15s;padding:0;
order:3;
}
/* Botón atrás en topbar → ocultamos (ahora está en subencabezado) */
#mobileBack{ display:none!important; }
#mobileMenu:active{ background:var(–border); }
/* Topbar móvil: logo izq | datepicker centro | hamburger derecha */
.topbar{ justify-content:space-between; }
#mobileTopLogo{
display:flex!important;
align-items:center;
flex-shrink:0;
order:1;
}
/* Datepicker centrado entre logo y hamburger */
.topbar-right{
order:2;
flex:1;
justify-content:center;
gap:0;
align-items:center;
}
.topbar-title{ display:none; }
.live-badge{ display:none; }
.date-pick{ display:block!important;padding:7px 10px;font-size:12px;width:140px; }
.btn-primary{ display:none; }

/* ── Subencabezado título sección (móvil, no dashboard) ── */
#mobileSectionHeader{
display:none;
height:42px;flex-shrink:0;
background:var(–surface);
border-bottom:1px solid var(–border);
align-items:center;
padding:0 16px;gap:10px;
}
#mobileSectionHeader.visible{
display:flex;
}
#mobileSectionHeader .back-btn{
display:flex;align-items:center;justify-content:center;
width:30px;height:30px;border-radius:8px;
background:var(–card);border:1px solid var(–border);
color:var(–text2);font-size:16px;cursor:pointer;
padding:0;flex-shrink:0;
border:none;background:none;
}
#mobileSectionTitle{
font-size:13px;font-weight:600;color:var(–text2);
flex:1;text-align:center;
}
#mobileSectionHeader .back-btn-spacer{
width:30px;flex-shrink:0;
}
/* Ajustar altura de page.active cuando hay subencabezado */
.has-subheader .page.active{
height:calc(100dvh - 58px - 42px);
}

/* Overlay menú móvil */
#mobileMenuOverlay{
display:none;
position:fixed;inset:0;z-index:2000;
}
#mobileMenuOverlay.open{ display:block; }
#mobileMenuDrawer{
position:absolute;top:0;left:0;bottom:0;width:240px;
background:var(–surface);border-right:1px solid var(–border);
display:flex;flex-direction:column;
transform:translateX(-100%);transition:transform .25s ease;
padding-top:env(safe-area-inset-top);
}
#mobileMenuOverlay.open #mobileMenuDrawer{ transform:translateX(0); }
#mobileMenuBackdrop{
position:absolute;inset:0;background:rgba(0,0,0,.5);
cursor:pointer;
}
.mm-logo{
padding:22px 20px 16px;
display:flex;align-items:center;justify-content:center;
}
.mm-nav{ flex:1;overflow-y:auto;padding:12px 10px; }
.mm-btn{
display:flex;align-items:center;gap:11px;
padding:12px 14px;border-radius:10px;
cursor:pointer;font-size:14px;font-weight:500;
color:var(–text2);transition:all .15s;
border:none;background:none;text-align:left;
width:100%;font-family:var(–font);
}
.mm-btn:hover{ background:var(–card);color:var(–text); }
.mm-btn.active{ background:var(–green-dim);color:var(–green); }
.mm-icon{ font-size:16px;width:22px;text-align:center;flex-shrink:0; }
.mm-sep{ height:1px;background:var(–border);margin:8px 10px; }

/* ── Pages: scrollable content ── */
.page{
display:none!important;
}
.page.active{
display:block!important;
padding:14px 14px 80px;
flex:1;
overflow-y:auto;
-webkit-overflow-scrolling:touch;
height:calc(100dvh - 58px);
box-sizing:border-box;
}

/* ── Stats grid: 2 columnas en móvil ── */
.stats-grid{
grid-template-columns:1fr 1fr 1fr;
gap:8px;
margin-bottom:14px;
}
.stat-card{
padding:12px 10px 10px;
position:relative;
}
.stat-icon{
display:none;
}
.stat-value{
font-size:20px;
margin-bottom:2px;
}
.stat-label{
font-size:9px;
margin-bottom:6px;
letter-spacing:.4px;
}
.stat-trend{ font-size:10px; }

/* ── Chart row: columna única ── */
.chart-row{
grid-template-columns:1fr;
gap:12px;
margin-bottom:16px;
}
.chart-card{ padding:16px; }

/* ── Slots chips: más compactos ── */
.slots-chips{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; padding:0 2px; }
.slot-chip{ flex:0 0 calc(33.333% - 6px); min-width:0; padding:8px 6px; box-sizing:border-box; }
.slot-chip-time{ font-size:13px; }

/* ── Table: scroll horizontal ── */
.table-wrap{
overflow-x:auto;
-webkit-overflow-scrolling:touch;
border-radius:var(–r);
}
table{ min-width:580px; }
td,th{ padding:10px 12px; }
.td-name{ font-size:12px; }
.td-sub{ font-size:10px; }

/* Toolbar filtros: columna ── */
.toolbar{
flex-direction:column;
align-items:stretch;
gap:8px;
padding:12px 14px;
}
.search{ min-width:unset; width:100%; }
.filt{ width:100%; }

/* Ocultar columnas menos importantes en tabla */
.hide-mobile{ display:none!important; }

/* ── Slots edit grid: 1 col ── */
.slots-edit-grid{
grid-template-columns:1fr;
gap:10px;
}
.slot-edit-card{ padding:16px; }
.se-time{ font-size:20px; }

/* ── Analytics hero: 2 cols ── */
.analytics-hero{
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:16px;
}
.comp-card{ padding:14px; }
.comp-value{ font-size:20px; }

.week-karts{
grid-template-columns:1fr;
gap:10px;
margin-bottom:16px;
}

/* ── Nueva reserva form ── */
.form-shell{ max-width:100%; }
.step-bar{ overflow-x:auto; padding-bottom:8px; }
.step-lbl{ font-size:11px; white-space:nowrap; }
.form-section{ padding:16px; margin-bottom:12px; }
.grid-2{ grid-template-columns:1fr; gap:12px; }
.grid-3{ grid-template-columns:1fr; gap:12px; }
.tipo-grid{ grid-template-columns:1fr 1fr; gap:8px; }
.tipo-card{ padding:12px 14px; }

/* ── Bottom nav: reemplaza sidebar ── */
#mobileNav{
display:flex;
position:fixed;
bottom:0;left:0;right:0;
height:64px;
background:var(–surface);
border-top:1px solid var(–border);
z-index:1000;
justify-content:space-around;
align-items:center;
padding:0 4px;
padding-bottom:env(safe-area-inset-bottom);
}
.mnav-btn{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:3px;
flex:1;
height:100%;
cursor:pointer;
border:none;
background:none;
color:var(–text3);
font-family:var(–font);
transition:color .15s;
padding:8px 4px;
border-radius:0;
}
.mnav-btn.active{ color:var(–green); }
.mnav-btn.active .mnav-icon{ font-size:20px; }
.mnav-icon{ font-size:18px; line-height:1; transition:font-size .15s; }
.mnav-lbl{ font-size:9px; font-weight:600; letter-spacing:.3px; text-transform:uppercase; white-space:nowrap; }

/* ── Modal / overlay fixes ── */
[style*=“position:fixed”][style*=“z-index:9”] {
max-width:calc(100vw - 28px)!important;
left:14px!important;
right:14px!important;
width:auto!important;
}

/* ── Clientes: timeline compacto ── */
.hist-timeline{ padding-left:0; }

/* ── General text overflow protection ── */
.td-name,.td-sub,.user-name,.stat-label,
.chart-title,.se-time,.comp-label{
overflow:hidden;
text-overflow:ellipsis;
white-space:nowrap;
max-width:100%;
}

}

/* Ocultar bottom nav en desktop */
#mobileNav{ display:none; }

/* ── Tablet: 769–1024px ── */
@media(min-width:769px) and (max-width:1024px){
:root{ –sidebar:200px; }
.stats-grid{ grid-template-columns:repeat(3,1fr); }
.analytics-hero{ grid-template-columns:1fr 1fr; }
/* Analytics: fecha pickers en columna en móvil */
#anaDatePickers{
flex-direction:column !important;
align-items:flex-start !important;
gap:6px !important;
}
.page{ padding:20px; }
.topbar{ padding:0 20px; }
}

</style>
</head>
